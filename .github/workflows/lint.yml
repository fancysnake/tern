name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Run markdownlint-cli2
        run: mise exec -- markdownlint-cli2
